schema_version: "2"
circuit:
  id: develop
  version: "2026-04-01"
  purpose: Research, decide, prove, and ship a significant change.

  entry:
    command: /circuit
    expert_command: /circuit:develop
    signals:
      include: [approach_unclear, research_needed]
      exclude: [broken_flow, dead_code_only, migration_with_coexistence]

  entry_modes:
    default:
      start_at: intent-lock
      description: Idea-first feature development.
    spec-review:
      start_at: spec-intake
      description: Start from an existing RFC, PRD, or specification.

  steps:
    - id: intent-lock
      title: Intent Lock
      executor: orchestrator
      kind: checkpoint
      protocol: intent-lock@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/intent-brief.md
          schema: intent-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: intent_lock
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: evidence-probes

    - id: spec-intake
      title: Spec Intake
      executor: orchestrator
      kind: checkpoint
      protocol: spec-intake@v1
      reads: [user.task, "referenced:spec"]
      writes:
        artifact:
          path: artifacts/spec-brief.md
          schema: spec-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: spec_intake
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: spec-reviews

    - id: spec-reviews
      title: Multi-Angle Spec Review
      executor: worker
      kind: dispatch
      protocol: parallel-review-fanout@v1
      reads: [artifacts/spec-brief.md]
      writes:
        artifacts:
          - path: artifacts/implementer-review.md
            schema: spec-review@v1
          - path: artifacts/systems-review.md
            schema: spec-review@v1
          - path: artifacts/comparative-review.md
            schema: spec-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [reviews_complete]
      routes:
        pass: caveat-resolution
        fail: "@escalate"

    - id: caveat-resolution
      title: Caveat Resolution
      executor: orchestrator
      kind: checkpoint
      protocol: caveat-resolution@v1
      reads:
        any_of:
          - [artifacts/implementer-review.md, artifacts/systems-review.md, artifacts/comparative-review.md, "optional:artifacts/seam-proof.md"]
          - [artifacts/decision-packet.md, artifacts/seam-proof.md]
      writes:
        artifact:
          path: artifacts/amended-spec.md
          schema: amended-spec@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: caveat_resolution
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: execution-contract

    - id: evidence-probes
      title: Parallel Evidence Probes
      executor: worker
      kind: dispatch
      protocol: parallel-evidence-probes@v1
      reads: [artifacts/intent-brief.md]
      writes:
        artifacts:
          - path: artifacts/external-digest.md
            schema: evidence-digest@v1
          - path: artifacts/internal-digest.md
            schema: evidence-digest@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [research.external]
        optional: [repo.analysis]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: constraints
        fail: "@escalate"

    - id: constraints
      title: Constraints Synthesis
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/external-digest.md, artifacts/internal-digest.md]
      writes:
        artifact:
          path: artifacts/constraints.md
          schema: constraints@v1
      gate:
        kind: schema_sections
        source: artifacts/constraints.md
        required: [Hard Invariants, Seams and Integration Points, Open Questions]
      routes:
        pass: options
        fail: "@escalate"

    - id: options
      title: Generate Options
      executor: worker
      kind: dispatch
      protocol: option-generation@v1
      reads: [artifacts/intent-brief.md, artifacts/constraints.md]
      writes:
        artifact:
          path: artifacts/options.md
          schema: options@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [architecture.exploration]
        optional: [comparative.analysis]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [options_ready]
      routes:
        pass: decision-packet
        fail: "@escalate"

    - id: decision-packet
      title: Adversarial Evaluation
      executor: worker
      kind: dispatch
      protocol: adversarial-evaluation@v1
      reads: [artifacts/constraints.md, artifacts/options.md]
      writes:
        artifact:
          path: artifacts/decision-packet.md
          schema: decision-packet@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: [comparative.analysis]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [decision_packet_ready]
      routes:
        pass: tradeoff-decision
        fail: "@escalate"

    - id: tradeoff-decision
      title: Tradeoff Decision
      executor: orchestrator
      kind: checkpoint
      protocol: tradeoff-decision@v1
      reads: [artifacts/decision-packet.md]
      writes:
        artifact:
          path: artifacts/adr.md
          schema: adr@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: tradeoff_decision
        options: [choose]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [choose]
      routes:
        choose: execution-contract

    - id: execution-contract
      title: Execution Contract
      executor: orchestrator
      kind: synthesis
      reads:
        any_of:
          - [artifacts/adr.md, artifacts/constraints.md, artifacts/intent-brief.md, "optional:artifacts/seam-proof.md"]
          - [artifacts/amended-spec.md, "optional:artifacts/seam-proof.md"]
      writes:
        artifact:
          path: artifacts/execution-packet.md
          schema: execution-packet@v1
      gate:
        kind: schema_sections
        source: artifacts/execution-packet.md
        required:
          - Invariants
          - Interface Boundaries
          - Slice Order
          - Test Obligations
          - Verification Commands
      routes:
        pass: prove-seam
        fail: "@escalate"

    - id: prove-seam
      title: Prove the Hardest Seam
      executor: worker
      kind: dispatch
      protocol: seam-proof@v1
      reads: [artifacts/execution-packet.md]
      writes:
        artifact:
          path: artifacts/seam-proof.md
          schema: seam-proof@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [testing.tdd]
        optional: [repo.analysis]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [design_holds]
        reroute:
          needs_adjustment: execution-contract
          design_invalidated: caveat-resolution
      routes:
        pass: implement
        fail: "@escalate"

    - id: implement
      title: Implement
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/execution-packet.md]
      writes:
        artifact:
          path: artifacts/implementation-handoff.md
          schema: implementation-handoff@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: ship-review
        fail: "@escalate"

    - id: ship-review
      title: Final Ship Review
      executor: worker
      kind: dispatch
      protocol: final-review@v1
      reads:
        - artifacts/execution-packet.md
        - artifacts/implementation-handoff.md
        - "optional:artifacts/intent-brief.md"
        - "optional:artifacts/amended-spec.md"
      writes:
        artifact:
          path: artifacts/ship-review.md
          schema: ship-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ship_ready]
      routes:
        pass: "@complete"
        fail: "@escalate"
