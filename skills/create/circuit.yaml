schema_version: "2"
circuit:
  id: create
  version: "2026-04-01"
  purpose: >
    Codex-powered compiler for turning a natural-language workflow description
    into a circuit skill that matches the live corpus.

  entry:
    command: /circuit:create
    expert_command: /circuit:create
    signals:
      include: [new_circuit, workflow_to_circuit, author_circuit]
      exclude: [broken_flow, dead_code, migration]

  entry_modes:
    default:
      start_at: workflow-intake
      description: Start from a natural-language workflow description.

  steps:
    # ── Phase 1: Intake ──────────────────────────────────────────────────
    - id: workflow-intake
      title: Workflow Intake
      executor: orchestrator
      kind: checkpoint
      protocol: workflow-intake@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/workflow-brief.md
          schema: workflow-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: workflow_intake
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: pattern-mapping

    # ── Phase 2: Analysis ────────────────────────────────────────────────
    - id: pattern-mapping
      title: Pattern Mapping
      executor: worker
      kind: dispatch
      protocol: pattern-mapping@v1
      reads: [artifacts/workflow-brief.md]
      writes:
        artifact:
          path: artifacts/circuit-analysis.md
          schema: circuit-analysis@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [repo.analysis]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [analysis_ready]
      routes:
        pass: compile-circuit-files
        fail: "@escalate"

    # ── Phase 3: Authoring ───────────────────────────────────────────────
    - id: compile-circuit-files
      title: Compile Circuit Files
      executor: worker
      kind: dispatch
      protocol: compile-circuit-files@v1
      reads: [artifacts/workflow-brief.md, artifacts/circuit-analysis.md]
      writes:
        artifacts:
          - path: artifacts/draft-circuit.yaml
            schema: draft-circuit@v1
          - path: artifacts/draft-SKILL.md
            schema: draft-skill@v1
          - path: artifacts/cross-validation.md
            schema: cross-validation@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change]
        optional: [review.independent]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [drafts_ready]
      routes:
        pass: quality-gate
        fail: "@escalate"

    # ── Phase 4: Validation ──────────────────────────────────────────────
    - id: quality-gate
      title: Quality Gate
      executor: worker
      kind: dispatch
      protocol: quality-gate@v1
      reads: [artifacts/draft-circuit.yaml, artifacts/draft-SKILL.md, artifacts/cross-validation.md]
      writes:
        artifact:
          path: artifacts/validation-report.md
          schema: validation-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [validation_complete]
      routes:
        pass: claude-code-refinement
        fail: "@escalate"

    # ── Phase 5: Refinement ──────────────────────────────────────────────
    - id: claude-code-refinement
      title: Claude Code Refinement
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/draft-circuit.yaml, artifacts/draft-SKILL.md, artifacts/cross-validation.md, artifacts/validation-report.md]
      writes:
        artifact:
          path: artifacts/circuit.yaml
          schema: circuit@v1
      gate:
        kind: schema_sections
        source: artifacts/circuit.yaml
        required: [circuit, steps, entry, entry_modes]
      routes:
        pass: "@complete"
        fail: "@escalate"
