schema_version: "2"
circuit:
  id: run
  version: "2026-04-01"
  purpose: Default ship-change circuit for clear, non-trivial work.

  entry:
    command: /circuit
    expert_command: /circuit:run
    signals:
      include: [clear_approach, non_trivial]
      exclude: [broken_flow, architecture_decision, dead_code, migration, overnight]

  entry_modes:
    default:
      start_at: scope
      description: Start directly at auto-scope.
    intent:
      start_at: intent-lock
      description: Capture explicit priorities and non-goals before scoping.

  steps:
    - id: intent-lock
      title: Intent Lock
      executor: orchestrator
      kind: checkpoint
      protocol: intent-lock@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/intent-brief.md
          schema: intent-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: intent_lock
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: scope

    - id: scope
      title: Auto-Scope
      executor: orchestrator
      kind: synthesis
      reads: [user.task, repo.snapshot, "optional:artifacts/intent-brief.md", "optional:checkpoints/confirm-{attempt}.response.json"]
      writes:
        artifact:
          path: artifacts/scope.md
          schema: scope@v1
      gate:
        kind: schema_sections
        source: artifacts/scope.md
        required: [Task, Approach, Slices, Verification, Out of Scope]
      routes:
        pass: confirm
        fail: "@escalate"

    - id: confirm
      title: Scope Confirmation
      executor: orchestrator
      kind: checkpoint
      protocol: scope-confirmation@v1
      reads: [artifacts/scope.md]
      writes:
        artifact:
          path: artifacts/scope-confirmed.md
          schema: scope-confirmed@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
        handoff: handoffs/handoff-packet.json
      checkpoint:
        kind: scope_confirmation
        options: [confirm, amend, switch]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [confirm, amend, switch]
      routes:
        confirm: implement
        amend: scope
        switch: "@handoff"

    - id: implement
      title: Implement
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/scope-confirmed.md]
      writes:
        artifact:
          path: artifacts/execution-handoff.md
          schema: execution-handoff@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: summarize
        fail: "@escalate"

    - id: summarize
      title: Done Summary
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/scope-confirmed.md, artifacts/execution-handoff.md]
      writes:
        artifact:
          path: artifacts/done.md
          schema: done@v1
      gate:
        kind: schema_sections
        source: artifacts/done.md
        required: [Changes, Verification, Notes]
      routes:
        pass: "@complete"
        fail: "@escalate"
