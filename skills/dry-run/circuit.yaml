schema_version: "2"
circuit:
  id: dry-run
  version: "2026-04-01"
  purpose: >
    Interactive validation of a circuit skill by symbolically executing one concrete
    feature through every step. Single-session, orchestrator-only -- no worker dispatches.

  entry:
    command: /circuit:dry-run
    expert_command: /circuit:dry-run
    signals:
      include: [validate_circuit, trace_circuit, check_soundness]
      exclude: [broken_flow, new_circuit, author_circuit]

  entry_modes:
    default:
      start_at: collect-inputs
      description: Collect target circuit and test feature, then trace.

  steps:
    # ── Phase 1: Intake ──────────────────────────────────────────────────
    - id: collect-inputs
      title: Collect Inputs and Source Files
      executor: orchestrator
      kind: checkpoint
      protocol: collect-inputs@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/validation-scope.md
          schema: validation-scope@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: collect_inputs
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: resolve-constants

    # ── Phase 2: Resolution ──────────────────────────────────────────────
    - id: resolve-constants
      title: Resolve Constants
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/validation-scope.md]
      writes:
        artifact:
          path: artifacts/resolved-constants.md
          schema: resolved-constants@v1
      gate:
        kind: schema_sections
        source: artifacts/resolved-constants.md
        required: [Path Expansions, Undefined Symbols, Assumptions]
      routes:
        pass: inventory-steps
        fail: "@escalate"

    # ── Phase 3: Inventory ───────────────────────────────────────────────
    - id: inventory-steps
      title: Inventory Steps and Contracts
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/validation-scope.md, artifacts/resolved-constants.md]
      writes:
        artifact:
          path: artifacts/step-inventory.md
          schema: step-inventory@v1
      gate:
        kind: schema_sections
        source: artifacts/step-inventory.md
        required: [Steps, Worker Records, Topology Mismatches]
      routes:
        pass: simulate-and-trace
        fail: "@escalate"

    # ── Phase 4: Simulation ──────────────────────────────────────────────
    - id: simulate-and-trace
      title: Simulate and Trace
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/validation-scope.md, artifacts/resolved-constants.md, artifacts/step-inventory.md]
      writes:
        artifact:
          path: artifacts/dry-run-trace.md
          schema: dry-run-trace@v1
      gate:
        kind: schema_sections
        source: artifacts/dry-run-trace.md
        required: [Resolved Constants, Artifact Chain, Mechanical Failures Found, VERDICT]
      routes:
        pass: "@complete"
        fail: "@escalate"
