schema_version: "2"
circuit:
  id: ratchet-quality
  version: "2026-04-01"
  purpose: >
    Autonomous-only overnight quality improvement runs on an existing codebase.
    17 steps across 6 phases: Triage, Stabilize, Envision, Plan, Execute, Finalize.

  entry:
    command: /circuit
    expert_command: /circuit:ratchet-quality
    signals:
      include: [quality_improvement, overnight, unattended]
      exclude: [clear_approach, architecture_decision, dead_code, migration]

  entry_modes:
    default:
      start_at: mission-freeze
      description: Autonomous quality ratchet from mission freeze through closeout.

  steps:
    # ── Phase 1: Triage ──────────────────────────────────────────────────
    - id: mission-freeze
      title: Mission Freeze
      executor: orchestrator
      kind: synthesis
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/mission-brief.md
          schema: mission-brief@v1
      gate:
        kind: schema_sections
        source: artifacts/mission-brief.md
        required: [Quality Bar, Non-Goals, Constraints, Success Definition, Allowed File Scopes, Verification Commands]
      routes:
        pass: triage-probes
        fail: "@escalate"

    - id: triage-probes
      title: Triage Probes
      executor: worker
      kind: dispatch
      protocol: triage-probes@v1
      reads: [artifacts/mission-brief.md]
      writes:
        artifacts:
          - path: artifacts/baseline-audit.md
            schema: baseline-audit@v1
          - path: artifacts/quality-calibration.md
            schema: quality-calibration@v1
          - path: artifacts/improvement-backlog.md
            schema: improvement-backlog@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [repo.analysis]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: baseline-repair
        fail: "@escalate"

    # ── Phase 2: Stabilize ───────────────────────────────────────────────
    - id: baseline-repair
      title: Baseline Repair
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/mission-brief.md, artifacts/baseline-audit.md, artifacts/quality-calibration.md]
      writes:
        artifact:
          path: artifacts/stabilization-report.md
          schema: stabilization-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: stability-audit
        fail: "@escalate"

    - id: stability-audit
      title: Stability Audit
      executor: worker
      kind: dispatch
      protocol: stability-audit@v1
      reads:
        - artifacts/mission-brief.md
        - artifacts/baseline-audit.md
        - artifacts/stabilization-report.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/stability-findings.md
          schema: stability-findings@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [audit_complete]
      routes:
        pass: stabilize-ratchet
        fail: "@escalate"

    - id: stabilize-ratchet
      title: Stabilize Ratchet
      executor: worker
      kind: dispatch
      protocol: stabilize-ratchet@v1
      reads:
        - artifacts/stability-findings.md
        - artifacts/stabilization-report.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/stability-gate.md
          schema: stability-gate@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [stable]
        reroute:
          repair_again: baseline-repair
          retriage: triage-probes
      routes:
        pass: exploration-fanout
        fail: "@escalate"

    # ── Phase 3: Envision ────────────────────────────────────────────────
    - id: exploration-fanout
      title: Exploration Fanout
      executor: worker
      kind: dispatch
      protocol: exploration-fanout@v1
      reads:
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
        - artifacts/stability-gate.md
        - artifacts/improvement-backlog.md
      writes:
        artifacts:
          - path: artifacts/inside-out-digest.md
            schema: exploration-digest@v1
          - path: artifacts/outside-in-digest.md
            schema: exploration-digest@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [repo.analysis]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [outputs_ready]
      routes:
        pass: proposal-synthesis
        fail: "@escalate"

    - id: proposal-synthesis
      title: Proposal Synthesis
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/inside-out-digest.md
        - artifacts/outside-in-digest.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/improvement-proposal.md
          schema: improvement-proposal@v1
      gate:
        kind: schema_sections
        source: artifacts/improvement-proposal.md
        required: [Slices, Calibration Mapping, Risk Assessment]
      routes:
        pass: design-review
        fail: "@escalate"

    - id: design-review
      title: Design Review
      executor: worker
      kind: dispatch
      protocol: design-review@v1
      reads:
        - artifacts/improvement-proposal.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
        - artifacts/stability-gate.md
      writes:
        artifact:
          path: artifacts/design-review.md
          schema: design-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready]
      routes:
        pass: envision-ratchet
        fail: "@escalate"

    - id: envision-ratchet
      title: Envision Ratchet
      executor: worker
      kind: dispatch
      protocol: envision-ratchet@v1
      reads:
        - artifacts/improvement-proposal.md
        - artifacts/design-review.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/envisioned-packet.md
          schema: envisioned-packet@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready]
        reroute:
          needs_more_exploration: exploration-fanout
          retriage: triage-probes
      routes:
        pass: plan-synthesis
        fail: "@escalate"

    # ── Phase 4: Plan ────────────────────────────────────────────────────
    - id: plan-synthesis
      title: Plan Synthesis
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/envisioned-packet.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
        - artifacts/stability-gate.md
      writes:
        artifact:
          path: artifacts/implementation-plan.md
          schema: implementation-plan@v1
      gate:
        kind: schema_sections
        source: artifacts/implementation-plan.md
        required: [Candidate Batches, Verification, Rollback, Janitor Checkpoints]
      routes:
        pass: plan-review
        fail: "@escalate"

    - id: plan-review
      title: Plan Review
      executor: worker
      kind: dispatch
      protocol: plan-review@v1
      reads:
        - artifacts/implementation-plan.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
        - artifacts/envisioned-packet.md
      writes:
        artifact:
          path: artifacts/plan-review.md
          schema: plan-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready]
      routes:
        pass: plan-ratchet
        fail: "@escalate"

    - id: plan-ratchet
      title: Plan Ratchet
      executor: worker
      kind: dispatch
      protocol: plan-ratchet@v1
      reads:
        - artifacts/implementation-plan.md
        - artifacts/plan-review.md
        - artifacts/envisioned-packet.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/execution-charter.md
          schema: execution-charter@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready]
        reroute:
          re_envision: envision-ratchet
          retriage: triage-probes
      routes:
        pass: execute-batches
        fail: "@escalate"

    # ── Phase 5: Execute ─────────────────────────────────────────────────
    - id: execute-batches
      title: Execute Batches
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads:
        - artifacts/execution-charter.md
        - artifacts/quality-calibration.md
        - artifacts/stability-gate.md
        - artifacts/mission-brief.md
      writes:
        artifact:
          path: artifacts/execution-log.md
          schema: execution-log@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: execution-audit
        fail: "@escalate"

    - id: execution-audit
      title: Execution Audit
      executor: worker
      kind: dispatch
      protocol: execution-audit@v1
      reads:
        - artifacts/execution-log.md
        - artifacts/execution-charter.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/execution-audit.md
          schema: execution-audit@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready, partial]
      routes:
        pass: execution-ratchet
        fail: "@escalate"

    - id: execution-ratchet
      title: Execution Ratchet
      executor: worker
      kind: dispatch
      protocol: execution-ratchet@v1
      reads:
        - artifacts/execution-log.md
        - artifacts/execution-audit.md
        - artifacts/execution-charter.md
        - artifacts/quality-calibration.md
      writes:
        artifact:
          path: artifacts/execution-report.md
          schema: execution-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ready, partial]
        reroute:
          reopen_plan: plan-ratchet
      routes:
        pass: final-review
        fail: "@escalate"

    # ── Phase 6: Finalize ────────────────────────────────────────────────
    - id: final-review
      title: Final Review
      executor: worker
      kind: dispatch
      protocol: final-review@v1
      reads:
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
        - artifacts/execution-report.md
        - artifacts/execution-charter.md
      writes:
        artifact:
          path: artifacts/final-review.md
          schema: final-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ship_ready, partial]
        reroute:
          reopen_execute: execution-ratchet
      routes:
        pass: closeout-packet
        fail: "@escalate"

    - id: closeout-packet
      title: Closeout Packet
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/final-review.md
        - artifacts/execution-report.md
        - artifacts/mission-brief.md
        - artifacts/quality-calibration.md
      writes:
        artifacts:
          - path: artifacts/overnight-handoff.md
            schema: overnight-handoff@v1
          - path: artifacts/pr-brief.md
            schema: pr-brief@v1
          - path: artifacts/deferred-work.md
            schema: deferred-work@v1
      gate:
        kind: schema_sections
        source: artifacts/overnight-handoff.md
        required: [Verdict, Changes Summary, Deferred Items, PR Brief]
      routes:
        pass: "@complete"
        fail: "@escalate"
