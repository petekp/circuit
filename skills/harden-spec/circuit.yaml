schema_version: "2"
circuit:
  id: harden-spec
  version: "2026-04-01"
  deprecated: true
  replaced_by: "develop --spec-review"
  purpose: >
    DEPRECATED: Folded into develop --spec-review in slice-003.
    Artifact-driven circuit for turning a rough RFC, design spec, PRD, or circuit
    schema into a canonical amended spec, a build-ready execution packet, and a
    reviewed implementation plan without crossing into code.

  entry:
    command: /circuit:harden-spec
    expert_command: /circuit:harden-spec
    signals:
      include: []
      exclude: []

  entry_modes:
    default:
      start_at: spec-intake
      description: Start from an existing spec or RFC.

  steps:
    # ── Phase 1: Intake ──────────────────────────────────────────────────
    - id: spec-intake
      title: Spec Intake
      executor: orchestrator
      kind: checkpoint
      protocol: spec-intake@v1
      reads: [user.task, "referenced:spec"]
      writes:
        artifact:
          path: artifacts/spec-brief.md
          schema: spec-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: spec_intake
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: draft-digest

    # ── Phase 2: Multi-Angle Review ──────────────────────────────────────
    - id: draft-digest
      title: Draft Digest
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/spec-brief.md]
      writes:
        artifact:
          path: artifacts/draft-digest.md
          schema: draft-digest@v1
      gate:
        kind: schema_sections
        source: artifacts/draft-digest.md
        required: [Mechanism, Assumptions, Ambiguities]
      routes:
        pass: parallel-review-passes
        fail: "@escalate"

    - id: parallel-review-passes
      title: Parallel Review Passes
      executor: worker
      kind: dispatch
      protocol: parallel-review-fanout@v1
      reads: [artifacts/draft-digest.md]
      writes:
        artifacts:
          - path: artifacts/implementer-review.md
            schema: spec-review@v1
          - path: artifacts/systems-review.md
            schema: spec-review@v1
          - path: artifacts/comparative-review.md
            schema: spec-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 1
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [reviews_complete]
      routes:
        pass: caveat-resolution
        fail: "@escalate"

    # ── Phase 3: Amendment ───────────────────────────────────────────────
    - id: caveat-resolution
      title: Caveat Resolution
      executor: orchestrator
      kind: checkpoint
      protocol: caveat-resolution@v1
      reads: [artifacts/implementer-review.md, artifacts/systems-review.md, artifacts/comparative-review.md]
      writes:
        artifact:
          path: artifacts/caveat-resolution.md
          schema: caveat-resolution@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: caveat_resolution
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: amended-draft

    - id: amended-draft
      title: Amended Draft
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/draft-digest.md, artifacts/caveat-resolution.md]
      writes:
        artifact:
          path: artifacts/amended-spec.md
          schema: amended-spec@v1
      gate:
        kind: schema_sections
        source: artifacts/amended-spec.md
        required: [Accepted Caveats, Deferred Risks]
      routes:
        pass: execution-packet
        fail: "@escalate"

    # ── Phase 4: Contracting ─────────────────────────────────────────────
    - id: execution-packet
      title: Execution Packet
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/amended-spec.md, artifacts/systems-review.md, artifacts/caveat-resolution.md]
      writes:
        artifact:
          path: artifacts/execution-packet.md
          schema: execution-packet@v1
      gate:
        kind: schema_sections
        source: artifacts/execution-packet.md
        required: [Invariants, Verification Strategy, Rollback or Reopen Triggers]
      routes:
        pass: implementation-plan
        fail: "@escalate"

    # ── Phase 5: Planning ────────────────────────────────────────────────
    - id: implementation-plan
      title: Implementation Plan
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/amended-spec.md, artifacts/execution-packet.md]
      writes:
        artifact:
          path: artifacts/implementation-plan.md
          schema: implementation-plan@v1
      gate:
        kind: schema_sections
        source: artifacts/implementation-plan.md
        required: [Slices, Test Obligations]
      routes:
        pass: plan-review
        fail: "@escalate"

    # ── Phase 6: Validation ──────────────────────────────────────────────
    - id: plan-review
      title: Plan Review
      executor: worker
      kind: dispatch
      protocol: plan-review@v1
      reads: [artifacts/execution-packet.md, artifacts/implementation-plan.md]
      writes:
        artifact:
          path: artifacts/plan-review.md
          schema: plan-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [plan_ready]
      routes:
        pass: "@complete"
        fail: "@escalate"
