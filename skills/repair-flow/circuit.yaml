schema_version: "2"
circuit:
  id: repair-flow
  version: "2026-04-01"
  purpose: Forensic debugging circuit for broken, flaky, or operationally unsafe end-to-end flows.

  entry:
    command: /circuit:repair-flow
    expert_command: /circuit:repair-flow
    signals:
      include: [broken_flow, flaky_behavior, operational_risk]
      exclude: [known_bug, clear_repro, architecture_decision]

  entry_modes:
    default:
      start_at: failure-brief
      description: Start with failure framing.

  steps:
    - id: failure-brief
      title: Failure Brief
      executor: orchestrator
      kind: checkpoint
      protocol: failure-brief@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/failure-brief.md
          schema: failure-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: failure_brief
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: live-flow-audit

    - id: live-flow-audit
      title: Live Flow Audit
      executor: worker
      kind: dispatch
      protocol: forensic-flow-audit@v1
      reads: [artifacts/failure-brief.md]
      writes:
        artifact:
          path: artifacts/audit-trace.md
          schema: audit-trace@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [repo.analysis]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [audit_complete]
      routes:
        pass: layered-causal-map
        fail: "@escalate"

    - id: layered-causal-map
      title: Layered Causal Map
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/failure-brief.md, artifacts/audit-trace.md]
      writes:
        artifact:
          path: artifacts/causal-map.md
          schema: causal-map@v1
      gate:
        kind: schema_sections
        source: artifacts/causal-map.md
        required: [Symptom-to-Layer Mapping, Facts vs Hypotheses]
      routes:
        pass: repair-focus-checkpoint
        fail: "@escalate"

    - id: repair-focus-checkpoint
      title: Repair Focus Checkpoint
      executor: orchestrator
      kind: checkpoint
      protocol: repair-focus@v1
      reads: [artifacts/causal-map.md]
      writes:
        artifact:
          path: artifacts/repair-steer.md
          schema: repair-steer@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: repair_focus
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: regression-contract

    - id: regression-contract
      title: Regression Contract
      executor: worker
      kind: dispatch
      protocol: regression-contract@v1
      reads: [artifacts/failure-brief.md, artifacts/causal-map.md, artifacts/repair-steer.md]
      writes:
        artifact:
          path: artifacts/regression-contract.md
          schema: regression-contract@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [testing.tdd]
        optional: [repo.analysis]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [contract_ready]
      routes:
        pass: repair-packet
        fail: "@escalate"

    - id: repair-packet
      title: Repair Packet
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/causal-map.md, artifacts/repair-steer.md, artifacts/regression-contract.md]
      writes:
        artifact:
          path: artifacts/repair-packet.md
          schema: repair-packet@v1
      gate:
        kind: schema_sections
        source: artifacts/repair-packet.md
        required: [Slice Order, Layer Owners, Regression Obligations]
      routes:
        pass: layered-repair
        fail: "@escalate"

    - id: layered-repair
      title: Layered Repair
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/repair-packet.md, artifacts/regression-contract.md]
      writes:
        artifact:
          path: artifacts/repair-handoff.md
          schema: repair-handoff@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: flow-reaudit
        fail: "@escalate"

    - id: flow-reaudit
      title: Flow Reaudit
      executor: worker
      kind: dispatch
      protocol: forensic-flow-audit@v1
      reads: [artifacts/failure-brief.md, artifacts/audit-trace.md, artifacts/repair-handoff.md]
      writes:
        artifact:
          path: artifacts/flow-verdict.md
          schema: flow-verdict@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [repo.analysis]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [closed]
        reroute:
          partial: repair-focus-checkpoint
          reopen: layered-causal-map
      routes:
        pass: "@complete"
        fail: "@escalate"
