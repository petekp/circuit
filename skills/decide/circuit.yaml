schema_version: "2"
circuit:
  id: decide
  version: "2026-04-01"
  purpose: Architecture decision workflow for choosing between meaningful options under uncertainty.

  entry:
    command: /circuit:decide
    expert_command: /circuit:decide
    signals:
      include: [architecture_decision, protocol_choice, multiple_viable_options]
      exclude: [clear_approach, broken_flow, dead_code_only]

  entry_modes:
    default:
      start_at: decision-frame
      description: Start with decision framing.

  steps:
    - id: decision-frame
      title: Decision Frame
      executor: orchestrator
      kind: checkpoint
      protocol: decision-frame@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/decision-brief.md
          schema: decision-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: decision_frame
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: current-system-map

    - id: current-system-map
      title: Current System Map
      executor: worker
      kind: dispatch
      protocol: system-map-exploration@v1
      reads: [artifacts/decision-brief.md]
      writes:
        artifact:
          path: artifacts/current-system-map.md
          schema: current-system-map@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [architecture.exploration]
        optional: [repo.analysis]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [map_complete]
      routes:
        pass: generate-serious-options
        fail: "@escalate"

    - id: generate-serious-options
      title: Generate Serious Options
      executor: worker
      kind: dispatch
      protocol: option-generation@v1
      reads: [artifacts/decision-brief.md, artifacts/current-system-map.md]
      writes:
        artifact:
          path: artifacts/decision-options.md
          schema: decision-options@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [architecture.exploration]
        optional: [comparative.analysis]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [options_ready]
      routes:
        pass: score-and-compare
        fail: "@escalate"

    - id: score-and-compare
      title: Score and Compare
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/decision-brief.md, artifacts/current-system-map.md, artifacts/decision-options.md]
      writes:
        artifact:
          path: artifacts/decision-scorecard.md
          schema: decision-scorecard@v1
      gate:
        kind: schema_sections
        source: artifacts/decision-scorecard.md
        required: [Weighted Dimensions, Per-Option Reasoning, Confidence Labels]
      routes:
        pass: tradeoff-weighting-checkpoint
        fail: "@escalate"

    - id: tradeoff-weighting-checkpoint
      title: Tradeoff Weighting Checkpoint
      executor: orchestrator
      kind: checkpoint
      protocol: tradeoff-weighting@v1
      reads: [artifacts/decision-scorecard.md]
      writes:
        artifact:
          path: artifacts/decision-steer.md
          schema: decision-steer@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: tradeoff_weighting
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: pressure-test-leading-option

    - id: pressure-test-leading-option
      title: Pressure Test the Leading Option
      executor: worker
      kind: dispatch
      protocol: adversarial-pressure-test@v1
      reads:
        - artifacts/current-system-map.md
        - artifacts/decision-options.md
        - artifacts/decision-scorecard.md
        - artifacts/decision-steer.md
      writes:
        artifact:
          path: artifacts/pressure-report.md
          schema: pressure-report@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: [architecture.exploration]
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [pressure_complete]
      routes:
        pass: decision-commit
        fail: "@escalate"

    - id: decision-commit
      title: Decision Commit
      executor: orchestrator
      kind: checkpoint
      protocol: decision-commit@v1
      reads: [artifacts/decision-scorecard.md, artifacts/pressure-report.md]
      writes:
        artifact:
          path: artifacts/decision-choice.md
          schema: decision-choice@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: decision_commit
        options: [commit, revisit]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [commit, revisit]
      routes:
        commit: publish-adr-and-implementation-guide
        revisit: tradeoff-weighting-checkpoint

    - id: publish-adr-and-implementation-guide
      title: Publish ADR and Implementation Guide
      executor: orchestrator
      kind: synthesis
      reads:
        - artifacts/decision-brief.md
        - artifacts/current-system-map.md
        - artifacts/decision-choice.md
        - artifacts/pressure-report.md
      writes:
        artifact:
          path: artifacts/decision-guide.md
          schema: decision-guide@v1
      gate:
        kind: schema_sections
        source: artifacts/decision-guide.md
        required: [Decision Rationale, Implementation Guardrails, Reopen Conditions]
      routes:
        pass: "@complete"
        fail: "@escalate"
