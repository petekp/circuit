schema_version: "2"
circuit:
  id: fix
  version: "2026-04-01"
  purpose: Test-first bug fix circuit for known bugs with clear reproduction paths.

  entry:
    command: /circuit:fix
    expert_command: /circuit:fix
    signals:
      include: [known_bug, clear_repro, regression_test_needed]
      exclude: [broken_flow, flaky_behavior, approach_unclear]

  entry_modes:
    default:
      start_at: bug-brief
      description: Start with bug framing.

  steps:
    - id: bug-brief
      title: Bug Brief
      executor: orchestrator
      kind: checkpoint
      protocol: bug-brief@v1
      reads: [user.task, repo.snapshot]
      writes:
        artifact:
          path: artifacts/bug-brief.md
          schema: bug-brief@v1
        request: checkpoints/{step_id}-{attempt}.request.json
        response: checkpoints/{step_id}-{attempt}.response.json
      checkpoint:
        kind: bug_brief
        options: [continue]
        materialize_artifact: true
      gate:
        kind: checkpoint_selection
        source: checkpoints/{step_id}-{attempt}.response.json
        allow: [continue]
      routes:
        continue: regression-contract

    - id: regression-contract
      title: Regression Contract
      executor: orchestrator
      kind: synthesis
      reads: [artifacts/bug-brief.md]
      writes:
        artifact:
          path: artifacts/regression-contract.md
          schema: regression-contract@v1
      gate:
        kind: schema_sections
        source: artifacts/regression-contract.md
        required: [Failing Regression Tests]
      routes:
        pass: implement
        fail: "@escalate"

    - id: implement
      title: Implement
      executor: worker
      kind: dispatch
      protocol: workers-execute@v1
      reads: [artifacts/bug-brief.md, artifacts/regression-contract.md]
      writes:
        artifact:
          path: artifacts/fix-handoff.md
          schema: fix-handoff@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [code.change, review.independent]
        optional: [testing.tdd]
      budgets:
        max_attempts: 3
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [complete_and_hardened]
      routes:
        pass: ship-review
        fail: "@escalate"

    - id: ship-review
      title: Ship Review
      executor: worker
      kind: dispatch
      protocol: final-review@v1
      reads:
        - artifacts/bug-brief.md
        - artifacts/regression-contract.md
        - artifacts/fix-handoff.md
      writes:
        artifact:
          path: artifacts/fix-review.md
          schema: fix-review@v1
        request: jobs/{step_id}-{attempt}/dispatch-request.json
        receipt: jobs/{step_id}-{attempt}/dispatch-receipt.json
        result: jobs/{step_id}-{attempt}/job-result.json
      capabilities:
        required: [review.independent]
        optional: []
      budgets:
        max_attempts: 2
      gate:
        kind: result_verdict
        source: jobs/{step_id}-{attempt}/job-result.json
        pass: [ship_ready]
      routes:
        pass: "@complete"
        fail: "@escalate"
