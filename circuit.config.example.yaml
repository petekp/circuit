# circuit.config.yaml -- Per-project configuration for Circuitry v3
#
# Place this file at your project root (./circuit.config.yaml) or globally
# at ~/.claude/circuit.config.yaml. Project-level config takes precedence.
#
# Copy this file to your project root as circuit.config.yaml and customize.

# Role-based agent routing. Maps semantic roles to dispatch backends.
# Supported backends: codex, agent, auto, or any custom shell command.
roles:
  implementer: codex    # code writing, seam proofs, batch execution
  reviewer: agent       # independent review, audits, ship review
  researcher: agent     # evidence probes, external research

# Dispatch engine configuration (optional).
# Controls the default process for dispatch steps. The --role flag in
# dispatch.sh takes precedence over this setting.
#
# dispatch:
#   engine: auto               # global default (auto | codex | agent | <command>)
#   per_circuit:               # override per circuit
#     run: codex

# Map semantic capabilities to installed skills (optional).
# Resolution order: project config -> user config -> built-ins.
capabilities:
  code.change: []                    # auto-detected from file scope
  review.independent: []             # auto-detected
  testing.tdd: [tdd]                 # maps to the tdd skill
  research.external: [deep-research] # maps to deep-research skill
  repo.analysis: []                  # auto-detected from codebase structure
  architecture.exploration: [architecture-exploration, solution-explorer]

# Optional: declare expected capabilities for cross-machine consistency.
# If present, the session-start hook warns when an expected capability
# is not detected. Omit this section for fully automatic degradation.
#
# expected_capabilities:
#   - tdd
#   - deep-research

# Per-circuit overrides (optional).
circuits:
  run:
    capabilities: {}
  cleanup:
    capabilities:
      repo.analysis: [dead-code-sweep]
  migrate:
    capabilities: {}
